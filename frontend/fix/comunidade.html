<script>
  window.abrirModalCriarComm = function() {
    document.getElementById('modalCriarComm').style.display = 'flex';
  }
  window.fecharModalCriarComm = function() {
    document.getElementById('modalCriarComm').style.display = 'none';
  }

  function _getCardTitle(card){
    const t = card.querySelector('.com-title') || card.querySelector('.card-title') || card.querySelector('[data-title]');
    return (t ? t.textContent : '').trim();
  }

  function _getCardTipo(card){
    const attr = (card.getAttribute('data-tipo') || '').trim();
    if (attr) return attr;
    const pill = card.querySelector('.pill');
    return (pill ? pill.textContent : '').trim();
  }

  window.filtrarComunidadesTela = function(termo) {
    const q = (termo || '').toLowerCase().trim();
    const cards = document.querySelectorAll('.com-card, .card-comm');
    cards.forEach(card => {
      const titulo = _getCardTitle(card).toLowerCase();
      card.style.display = (!q || titulo.includes(q)) ? '' : 'none';
    });
    atualizarHeroStats();
  }

  window.filtrarComunidadesTipo = function(tipo, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    const target = (tipo || 'todos').toLowerCase();
    const cards = Array.from(document.querySelectorAll('.com-card, .card-comm'));
    const total = cards.length;
    const newCutoff = Math.max(1, Math.ceil(total * 0.2));

    cards.forEach((card, index) => {
      const t = _getCardTipo(card).toLowerCase();
      const text = (card.textContent || '').toLowerCase();
      const membersText = text.match(/(\d+)\s*membros?/i);
      const members = membersText ? Number(membersText[1]) : 0;
      let ok = false;
      if (target === 'todos') ok = true;
      else if (target === 'em-alta') ok = members >= 50 || t.includes('pro');
      else if (target === 'novos') ok = index < newCutoff;
      else if (target === 'perto') ok = /bairro|cidade|regiao|local|vizinh/.test(text) || t.includes('condom');
      else ok = (t === target) || (t.includes(target));
      card.style.display = ok ? '' : 'none';
    });
    atualizarHeroStats();
  }

  function atualizarSetasFiltrosComm() {
    const tabs = document.getElementById('commFilterTabs');
    if (!tabs) return;
    const prev = document.querySelector('.comm-filter-arrow.left');
    const next = document.querySelector('.comm-filter-arrow.right');
    const maxLeft = Math.max(0, tabs.scrollWidth - tabs.clientWidth);
    if (prev) prev.disabled = tabs.scrollLeft <= 2;
    if (next) next.disabled = tabs.scrollLeft >= maxLeft - 2;
  }

  window.scrollCommFiltros = function(dir) {
    const tabs = document.getElementById('commFilterTabs');
    if (!tabs) return;
    const amount = Math.max(150, Math.floor(tabs.clientWidth * 0.75));
    tabs.scrollBy({ left: (dir < 0 ? -amount : amount), behavior: 'smooth' });
  }

  function atualizarHeroStats() {
    const allCards = Array.from(document.querySelectorAll('#listaComunidades .com-card, #listaComunidades .card-comm'));
    const visibleCards = allCards.filter((c) => c.style.display !== 'none');
    const joined = document.querySelectorAll('#listaMeusGrupos .my-group-item').length;
    let membersTotal = 0;
    visibleCards.forEach((card) => {
      const m = (card.textContent || '').match(/(\d+)\s*membros?/i);
      if (m) membersTotal += Number(m[1] || 0);
    });
    const avgOnline = visibleCards.length ? Math.max(4, Math.round((membersTotal / visibleCards.length) * 0.12)) : 0;
    const totalEl = document.getElementById('heroTotalGroups');
    const joinedEl = document.getElementById('heroJoinedGroups');
    const onlineEl = document.getElementById('heroOnlineNow');
    if (totalEl) totalEl.textContent = String(visibleCards.length || allCards.length || 0);
    if (joinedEl) joinedEl.textContent = String(joined || 0);
    if (onlineEl) onlineEl.textContent = String(avgOnline || 0);
  }

  const __commRuntime = window.dokePageRuntime || null;
  const __commOn = (target, type, handler, options) => {
    if (!target || typeof target.addEventListener !== 'function' || !type || typeof handler !== 'function') return;
    if (__commRuntime && typeof __commRuntime.on === 'function') {
      __commRuntime.on(target, type, handler, options);
      return;
    }
    target.addEventListener(type, handler, options);
  };
  const __commLater = (handler, ms) => {
    if (typeof handler !== 'function') return;
    if (__commRuntime && typeof __commRuntime.timeout === 'function') {
      __commRuntime.timeout(handler, ms);
      return;
    }
    setTimeout(handler, ms);
  };
  const __commObserve = (observer) => {
    if (!observer) return observer;
    if (__commRuntime && typeof __commRuntime.observer === 'function') {
      return __commRuntime.observer(observer);
    }
    if (typeof window.dokeRegisterTeardown === 'function') {
      window.dokeRegisterTeardown(() => { try { observer.disconnect(); } catch(_){} });
    }
    return observer;
  };

  function setupCommObservers() {
    const list = document.getElementById('listaComunidades');
    const my = document.getElementById('listaMeusGrupos');
    if (!list) return;
    const sync = () => {
      atualizarHeroStats();
    };
    const mo = __commObserve(new MutationObserver(sync));
    mo.observe(list, { childList: true, subtree: true });
    if (my) {
      const moMy = __commObserve(new MutationObserver(sync));
      moMy.observe(my, { childList: true, subtree: true });
    }
    sync();
  }

  // Inicia carregamento (dados reais)
  const __initComunidadePage = () => {
    try{
      if (window.carregarComunidadesGerais) window.carregarComunidadesGerais();
      const bootMyGroups = () => { if (window.carregarMeusGrupos) window.carregarMeusGrupos(); };
      if ('requestIdleCallback' in window) requestIdleCallback(bootMyGroups, { timeout: 1200 });
      else __commLater(bootMyGroups, 220);
    }catch(e){ console.warn(e); }

    const tabs = document.getElementById('commFilterTabs');
    if (tabs) {
      __commOn(tabs, 'scroll', atualizarSetasFiltrosComm, { passive: true });
      __commOn(window, 'resize', atualizarSetasFiltrosComm);
      __commLater(atualizarSetasFiltrosComm, 40);
    }
    setupCommObservers();
  };
  if (document.readyState === 'loading') __commOn(document, 'DOMContentLoaded', __initComunidadePage);
  else __initComunidadePage();
</script>

<script>
(function(){
  const sample = [
    {titulo:'Profissionais perto de voc�',desc:'Encontre trocas �teis, oportunidades locais e networking por cidade.',tag:'Em alta',acao:'Explorar'},
    {titulo:'Neg�cios e servi�os',desc:'Discuss�es mais objetivas sobre atendimento, pre�o, agenda e capta��o.',tag:'Profissional',acao:'Abrir'},
    {titulo:'Comunidade do bairro',desc:'Pedidos r�pidos, indica��es e avisos �teis sem exagero visual.',tag:'Perto de voc�',acao:'Ver grupos'}
  ];
  function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));}
  function paintFallback(){
    const list = document.getElementById('listaComunidades');
    if(!list) return;
    const hasCards = list.querySelector('.com-card,.card-comm');
    if(hasCards) return;
    list.innerHTML = sample.map((item)=>`<article class="card-comm fallback-card"><div class="comm-card-content"><div class="comm-card-header"><h3>${esc(item.titulo)}</h3><span class="pill">${esc(item.tag)}</span></div><p>${esc(item.desc)}</p><button class="btn-ver-grupo" type="button">${esc(item.acao)}</button></div></article>`).join('');
  }
  function bindSearch(){
    const input = document.getElementById('inputBuscaComm');
    const list = document.getElementById('listaComunidades');
    if(!input || !list || input.__dokeBound) return;
    input.__dokeBound = true;
    input.addEventListener('input', function(){
      const q = String(this.value||'').toLowerCase();
      list.querySelectorAll('.com-card,.card-comm').forEach((card)=>{
        const txt = String(card.textContent||'').toLowerCase();
        card.style.display = !q || txt.includes(q) ? '' : 'none';
      });
    });
  }
  window.addEventListener('load', function(){ setTimeout(bindSearch, 300); }, {once:true});
})();
</script>
