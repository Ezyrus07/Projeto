<section class="doke-v2-page doke-v2-page-messages" data-messages-page>
  <div class="v2-messages-shell">
    <section class="v2-messages-hero">
      <div>
        <h1>Mensagens</h1>
        <p>Converse com clientes e contatos em uma estrutura mais limpa, rápida e estável.</p>
      </div>
    </section>

    <section class="v2-messages-board" data-msg-board>
      <aside class="v2-messages-list-panel" data-msg-list-panel>
        <div class="v2-messages-toolbar">
          <label class="v2-messages-search">
            <i class='bx bx-search'></i>
            <input type="search" placeholder="Buscar conversa, pedido ou cliente" data-msg-search>
          </label>
        </div>
        <div class="v2-messages-list" data-msg-list aria-live="polite"></div>
        <div class="v2-messages-empty" data-msg-empty-list hidden><i class='bx bx-message-rounded'></i><h3>Nenhuma conversa</h3><p>Suas conversas aparecerão aqui.</p></div>
      </aside>

      <section class="v2-messages-thread-panel" data-msg-thread-panel>
        <div class="v2-messages-thread-empty" data-msg-empty-thread>
          <i class='bx bx-chat'></i>
          <h3>Selecione uma conversa</h3>
          <p>Abra uma thread para ver mensagens, pedido vinculado e ações rápidas.</p>
        </div>

        <div class="v2-messages-thread" data-msg-thread hidden>
          <header class="v2-messages-thread-head">
            <button type="button" class="v2-messages-back" data-msg-back aria-label="Voltar para conversas"><i class='bx bx-arrow-back'></i></button>
            <div class="v2-messages-thread-user">
              <div class="v2-messages-avatar" data-msg-avatar></div>
              <div>
                <strong data-msg-name>Conversa</strong>
                <small data-msg-meta>Sem contexto</small>
              </div>
            </div>
            <button type="button" class="v2-messages-archive" data-msg-archive>
              <i class='bx bx-archive'></i>
              <span>Arquivar</span>
            </button>
          </header>

          <div class="v2-messages-thread-body" data-msg-thread-body></div>

          <div class="v2-messages-thread-empty-inline" data-msg-empty-inline hidden>
            <i class='bx bx-comment-detail'></i>
            <p>Esta conversa ainda não tem mensagens.</p>
          </div>

          <form class="v2-messages-compose" data-msg-form>
            <input type="text" maxlength="500" placeholder="Escreva uma mensagem" data-msg-input>
            <button type="submit"><i class='bx bx-send'></i><span>Enviar</span></button>
          </form>
        </div>
      </section>
    </section>
  </div>
</section>
