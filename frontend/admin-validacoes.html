<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="doke-nav-boot.js?v=20260309v09"></script>
<title>Painel de Validacoes | Doke</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-init.js?v=20260218v43"></script>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link href="style.css?v=20260227v01" rel="stylesheet" />
  <link href="doke-a11y.css?v=20260207v21" rel="stylesheet" />
  <link href="doke-layout-fix.css?v=20260207v21" rel="stylesheet" />
  <link href="doke-fixes.css" rel="stylesheet" />
  <link href="doke-toast.css" rel="stylesheet" />
  <link href="doke-alerts.css" rel="stylesheet" />
  <link href="doke-ux.css?v=20260207v21" rel="stylesheet" />
  <link href="doke-shell.css?v=20260212v42" rel="stylesheet" />
  <link href="doke-responsive.css?v=20260207v21" rel="stylesheet" />
  <style>
    body[data-page="mais"]{
      background:
        radial-gradient(1200px 640px at 8% 0%, rgba(42,95,144,.18), transparent 56%),
        radial-gradient(980px 520px at 92% 8%, rgba(11,119,104,.12), transparent 58%),
        #f3f6fb;
      min-height: 100vh;
    }

    .av-wrap{
      width:min(1160px, calc(100vw - 30px));
      margin:18px auto 26px;
    }
    @media (min-width:1024px){
      .av-wrap{
        margin-left:calc(270px + 26px);
        width:min(1160px, calc(100vw - 322px));
      }
    }

    .av-hero{
      background: radial-gradient(1180px 500px at 50% 0%, rgba(255,255,255,.18), transparent 55%), linear-gradient(135deg, #1f4d75 0%, #13324f 55%, #0b7768 140%);
      color:#fff;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.2);
      box-shadow:0 16px 32px rgba(42,95,144,.23);
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:14px;
      flex-wrap:wrap;
    }
    .av-hero h1{
      margin:0;
      font-size:2rem;
      letter-spacing:-.02em;
    }
    .av-hero p{
      margin:8px 0 0;
      color:rgba(255,255,255,.9);
      max-width:780px;
      line-height:1.45;
    }
    .av-hero .av-tip{
      margin:0;
      border-radius:999px;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.28);
      padding:8px 14px;
      font-weight:800;
      font-size:.86rem;
      white-space:nowrap;
    }
    .av-tip--ok{
      background:rgba(16,185,129,.2) !important;
      border-color:rgba(167,243,208,.65) !important;
      color:#ecfdf5 !important;
    }
    .av-tip--warn{
      background:rgba(245,158,11,.2) !important;
      border-color:rgba(253,230,138,.65) !important;
      color:#fffbeb !important;
    }
    .av-tip--err{
      background:rgba(239,68,68,.2) !important;
      border-color:rgba(254,202,202,.7) !important;
      color:#fef2f2 !important;
    }
    .av-tip--pending{
      background:rgba(59,130,246,.2) !important;
      border-color:rgba(147,197,253,.7) !important;
      color:#eff6ff !important;
    }

    .av-kpis{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(4,minmax(130px,1fr));
      gap:10px;
    }
    @media (max-width:880px){ .av-kpis{ grid-template-columns:repeat(2,minmax(120px,1fr)); } }
    .av-kpi{
      background:#fff;
      border:1px solid #dbe6f3;
      border-radius:14px;
      box-shadow:0 8px 20px rgba(15,23,42,.05);
      padding:12px;
    }
    .av-kpi b{
      display:block;
      font-size:1.7rem;
      line-height:1;
      color:#0f2440;
    }
    .av-kpi span{
      font-size:.82rem;
      color:#5f748f;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .av-toolbar{
      margin-top:12px;
      background:rgba(255,255,255,.95);
      border:1px solid #dbe6f3;
      border-radius:14px;
      box-shadow:0 8px 20px rgba(15,23,42,.05);
      padding:10px;
      display:grid;
      grid-template-columns:minmax(220px,1fr) 220px auto;
      gap:10px;
      align-items:center;
    }
    @media (max-width:840px){ .av-toolbar{ grid-template-columns:1fr; } }
    .av-input,.av-select{
      width:100%;
      min-height:46px;
      border-radius:12px;
      border:1px solid #cfdced;
      background:#f9fbfe;
      color:#0f2440;
      font-weight:700;
      padding:0 14px;
      outline:none;
    }
    .av-input:focus,.av-select:focus{
      border-color:#6ea1d3;
      box-shadow:0 0 0 4px rgba(42,95,144,.12);
      background:#fff;
    }
    .av-actions{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }
    .av-btn{
      border:none;
      border-radius:12px;
      min-height:44px;
      padding:0 14px;
      font-weight:800;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:8px;
      transition:transform .12s ease, filter .16s ease;
    }
    .av-btn:hover{ filter:brightness(.98); transform:translateY(-1px); }
    .av-btn.primary{ background:#1f4d75; color:#fff; }
    .av-btn.soft{ background:#e8eef6; color:#22354f; border:1px solid #d2deec; }

    .av-gate, .av-empty{
      margin-top:12px;
      background:#fff;
      border:1px solid #dbe6f3;
      border-radius:14px;
      box-shadow:0 8px 20px rgba(15,23,42,.05);
      padding:16px;
      color:#314963;
    }
    .av-gate b, .av-empty b{
      display:block;
      color:#0f2440;
      margin-bottom:6px;
      font-size:1.02rem;
    }
    .av-gate code{
      background:#eef3f9;
      border:1px solid #d8e2ef;
      border-radius:8px;
      padding:2px 8px;
      font-size:.85rem;
    }

    .av-list{
      margin-top:12px;
      display:grid;
      gap:10px;
    }
    .av-card{
      background:#fff;
      border:1px solid #dbe6f3;
      border-radius:14px;
      box-shadow:0 8px 20px rgba(15,23,42,.05);
      padding:14px;
      display:grid;
      gap:10px;
    }
    .av-head{
      display:flex;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .av-head h3{
      margin:0;
      color:#0f2440;
      font-size:1.08rem;
    }
    .av-meta{
      display:grid;
      grid-template-columns:repeat(4,minmax(160px,1fr));
      gap:8px;
    }
    @media (max-width:980px){ .av-meta{ grid-template-columns:repeat(2,minmax(130px,1fr)); } }
    @media (max-width:640px){ .av-meta{ grid-template-columns:1fr; } }
    .av-meta .x{
      border:1px solid #e3eaf4;
      border-radius:11px;
      padding:8px 10px;
      background:#f9fbfe;
    }
    .av-meta .x .l{ font-size:.74rem; color:#6a819b; text-transform:uppercase; letter-spacing:.05em; font-weight:800; }
    .av-meta .x .v{ margin-top:3px; font-weight:800; color:#18304c; word-break:break-word; }

    .av-badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      border-radius:999px;
      border:1px solid transparent;
      padding:7px 12px;
      font-size:.83rem;
      font-weight:800;
    }
    .st-pendente{ background:#fff7ed; border-color:#fed7aa; color:#9a3412; }
    .st-analise{ background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; }
    .st-aprovado{ background:#ecfdf5; border-color:#bbf7d0; color:#166534; }
    .st-rejeitado{ background:#fef2f2; border-color:#fecaca; color:#991b1b; }

    .av-reason{
      width:100%;
      min-height:42px;
      border-radius:10px;
      border:1px solid #d3deec;
      background:#fbfdff;
      color:#13324f;
      padding:9px 12px;
      font-weight:600;
      resize:vertical;
    }
    .av-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .av-row .av-btn.approve{ background:#0b7768; color:#fff; }
    .av-row .av-btn.review{ background:#1f4d75; color:#fff; }
    .av-row .av-btn.reject{ background:#fff5f5; color:#b42318; border:1px solid #fecaca; }
    .av-row .av-btn.link{ background:#eef4fb; color:#1f4d75; border:1px solid #d4e0ef; text-decoration:none; }
  </style>
</head>
<body data-page="mais">
  <main class="av-wrap">
    <section class="av-hero">
      <div>
        <h1>Painel de validacoes</h1>
        <p>Analise as solicitacoes para tornar contas profissionais e liberar anuncio com controle e auditoria.</p>
      </div>
      <p class="av-tip av-tip--pending" id="avAdminSeal"><i class='bx bx-loader-alt bx-spin'></i> Verificando sessao admin...</p>
    </section>

    <section class="av-kpis" aria-live="polite">
      <article class="av-kpi"><b id="kpiTotal">0</b><span>Total</span></article>
      <article class="av-kpi"><b id="kpiPendente">0</b><span>Pendentes</span></article>
      <article class="av-kpi"><b id="kpiAnalise">0</b><span>Em analise</span></article>
      <article class="av-kpi"><b id="kpiAprovado">0</b><span>Aprovados</span></article>
    </section>

    <section class="av-toolbar">
      <input class="av-input" id="avSearch" type="search" placeholder="Buscar por nome, cpf, uid, cidade..." />
      <select class="av-select" id="avStatusFilter">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="analise">Em analise</option>
        <option value="aprovado">Aprovado</option>
        <option value="rejeitado">Rejeitado</option>
      </select>
      <div class="av-actions">
        <button class="av-btn soft" id="avRefreshBtn" type="button"><i class='bx bx-refresh'></i> Atualizar</button>
      </div>
    </section>

    <section class="av-gate" id="avGate" style="display:none;"></section>
    <section class="av-list" id="avList" aria-live="polite"></section>
  </main>

  <script src="admin-validacoes.js?v=20260303v04"></script>
  <script src="doke-toast.js"></script>
  <script src="doke-alerts.js?v=20260217v33"></script>
  <script defer src="doke-config.js"></script><script defer src="doke-ux.js"></script>
  <script src="doke-shell.js?v=20260309v97"></script>
</body>
</html>
