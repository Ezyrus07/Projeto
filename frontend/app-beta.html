<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doke Beta</title>
  <meta name="theme-color" content="#0b7768">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
  <link rel="stylesheet" href="style.css?v=20260211v45">
  <link rel="stylesheet" href="doke-a11y.css?v=20260207v21">
  <link rel="stylesheet" href="doke-layout-fix.css?v=20260207v21">
  <link rel="stylesheet" href="doke-fixes.css?v=20260117">
  <link rel="stylesheet" href="app-beta.css?v=20260305v4">
</head>
<body class="beta-shell-like-original" data-page="beta-shell">
  <header class="navbar-mobile">
    <div id="logo-mobile">
      <a href="#/home"><img src="assets/Imagens/doke-logo.png" alt="Doke"></a>
    </div>
    <div class="botoes-direita">
      <a class="entrar" href="index.html">Sair do beta</a>
    </div>
  </header>

  <div id="overlay-menu"></div>

  <header class="navbar-desktop">
    <div id="logo-desktop"><a href="#/home"><img src="assets/Imagens/doke-logo.png" alt="Doke"></a></div>
    <nav class="menu">
      <div class="cep-wrapper">
        <a class="cep" href="#" id="linkCepBeta">
          <svg fill="currentColor" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"></path>
          </svg>
          <span>Inserir CEP</span>
        </a>
      </div>
      <a href="#/anunciar">Anunciar</a>
      <a href="#/comunidades">Comunidades <span class="badge-novo1">NOVO</span></a>
      <a href="#/novidades">Novidades</a>
    </nav>
    <div class="botoes-direita">
      <div class="profile-container">
        <img id="betaProfileBtn" class="profile-img-btn" src="assets/Imagens/avatar.png" alt="Perfil">
        <div id="betaProfileMenu" class="dropdown-profile">
          <a class="dropdown-item" href="#/perfil"><i class='bx bx-user-circle'></i> Ver Perfil</a>
          <a class="dropdown-item" href="index.html"><i class='bx bx-exit'></i> Sair do beta</a>
        </div>
      </div>
    </div>
  </header>

  <aside class="sidebar-icones" id="betaSidebar">
    <div id="logo">
      <a href="#/home"><img src="assets/Imagens/doke-logo.png" alt="Doke"></a>
    </div>
    <div class="item"><a data-route="#/home" href="#/home"><i class="bx bx-home-alt icon azul"></i><span>Inicio</span></a></div>
    <div class="item"><a class="pv-search-toggle" href="#"><i class="bx bx-search-alt-2 icon azul"></i><span>Pesquisar</span></a></div>
    <div class="item"><a data-route="#/negocios" href="#/negocios"><i class="bx bx-store icon verde"></i><span>Negocios</span></a></div>
    <div class="item"><a data-route="#/notificacoes" href="#/notificacoes"><i class="bx bx-bell icon azul"></i><span>Notificacoes</span></a></div>
    <div class="item"><a data-route="#/mensagens" href="#/mensagens"><i class="bx bx-message-rounded-dots icon azul"></i><span>Mensagens</span></a></div>
    <div class="item"><a data-route="#/pedidos" href="#/pedidos"><i class="bx bx-package icon verde"></i><span>Pedidos</span></a></div>
    <div class="item"><a data-route="#/comunidades" href="#/comunidades"><i class="bx bx-group icon verde"></i><span>Comunidades</span></a></div>
    <div class="item"><a data-route="#/perfil" href="#/perfil"><i class="bx bx-user icon verde"></i><span>Perfil</span></a></div>
    <div class="item"><a data-route="#/mais" href="#/mais"><i class="bx bx-menu icon azul"></i><span>Mais</span></a></div>

    <section id="betaSidebarSearch" class="beta-sidebar-search" hidden>
      <div class="beta-sidebar-search__header">
        <button type="button" id="betaSidebarSearchBack" aria-label="Voltar"><i class='bx bx-arrow-back'></i></button>
        <strong>Pesquisar</strong>
      </div>
      <label class="beta-sidebar-search__input">
        <i class='bx bx-search-alt-2'></i>
        <input id="betaSidebarSearchInput" type="search" placeholder="Buscar servico ou categoria">
      </label>
      <div class="beta-sidebar-search__quick">
        <a href="#/negocios">Negocios</a>
        <a href="#/comunidades">Comunidades</a>
        <a href="#/pedidos">Pedidos</a>
      </div>
      <button type="button" id="betaSidebarSearchGo" class="beta-sidebar-search__go">Buscar</button>
    </section>
  </aside>

  <main id="betaMain" class="beta-main">
    <iframe id="betaFrameA" class="beta-frame is-active" title="Doke Beta A"></iframe>
    <iframe id="betaFrameB" class="beta-frame" title="Doke Beta B"></iframe>
    <div id="betaLoader" class="beta-loader"><i class='bx bx-loader-alt bx-spin'></i></div>
  </main>

  <script defer src="app-beta.js?v=20260305v4"></script>
</body>
</html>
