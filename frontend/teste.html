<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Personalizado</title>
    <style>
        :root {
            --primary-color: #077861; /* Verde sugerido */
            --secondary-color: #2a5f90; /* Azul sugerido */
            --text-light: #ffffff;
            --bg-card: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 320px;
            transition: transform 0.3s ease;
            border-top: 5px solid var(--primary-color);
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 25px;
            text-align: center;
            color: var(--text-light);
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .card-body {
            padding: 20px;
            color: #444;
            line-height: 1.6;
        }

        .card-footer {
            padding: 15px;
            text-align: center;
            background-color: #eee;
        }

        .btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2>Novo Design</h2>
        </div>
        <div class="card-body">
            <p>Este card foi estilizado utilizando a paleta de cores personalizada. O gradiente superior une o verde e o azul para um visual corporativo moderno.</p>
        </div>
        <div class="card-footer">
            <button class="btn">Saiba Mais</button>
        </div>
    </div>

</body>
</html>
