<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Serviço Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* Cores extraídas da sua imagem */
            --primary-blue: #244c7c;
            --accent-teal: #449c90;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --text-main: #1a2a3a;
            --text-muted: #64748b;
            --star-gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Card Principal */
        .card {
            background: var(--white);
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }

        /* Área da Foto do Trabalho */
        .card-image-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .main-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .main-photo {
            transform: scale(1.05);
        }

        /* Badge de Profissão */
        .service-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(36, 76, 124, 0.9); /* Azul da imagem com transparência */
            backdrop-filter: blur(4px);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Conteúdo */
        .card-body {
            padding: 20px;
        }

        /* Hashtags */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .tag {
            color: var(--accent-teal);
            font-size: 0.75rem;
            font-weight: 600;
            background: #ecfdfa;
            padding: 4px 8px;
            border-radius: 6px;
        }

        /* Perfil do Usuário */
        .profile-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-wrapper {
            position: relative;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid var(--accent-teal);
        }

        .verified-check {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: var(--accent-teal);
            color: white;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .user-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .rating-stars {
            font-size: 0.8rem;
            color: var(--star-gold);
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .rating-count {
            color: var(--text-muted);
            margin-left: 4px;
            font-weight: 400;
        }

        /* Botão de Ação */
        .cta-button {
            width: 100%;
            background: var(--accent-teal);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: filter 0.2s;
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        .cta-button:hover {
            filter: brightness(1.1);
        }

        /* Responsividade Mobile */
        @media (max-width: 480px) {
            .card {
                max-width: 100%;
            }
            .card-image-wrapper {
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <article class="card">
        <div class="card-image-wrapper">
            <span class="service-badge">Marcenaria Fina</span>
            <img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=800&auto=format&fit=crop" alt="Trabalho de Marcenaria" class="main-photo">
        </div>

        <div class="card-body">
            <div class="tags-container">
                <span class="tag">#moveis</span>
                <span class="tag">#decoração</span>
                <span class="tag">#sobmedida</span>
            </div>

            <div class="profile-section">
                <div class="user-info">
                    <div class="avatar-wrapper">
                        <img src="https://i.pravatar.cc/150?u=marcelo" alt="Marcelo Silva" class="user-avatar">
                        <div class="verified-check">
                            <i class="fas fa-check"></i>
                        </div>
                    </div>
                    <div>
                        <h2 class="user-name">Marcelo Silva</h2>
                        <div class="rating-stars">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <span class="rating-count">(128)</span>
                        </div>
                    </div>
                </div>
            </div>

            <button class="cta-button">
                <i class="far fa-paper-plane"></i>
                Solicitar Orçamento
            </button>
        </div>
    </article>

</body>
</html>
