<body data-page="comunidade">
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="fecharPopup()">&times;</span>
    <p class="titulo">Entre na sua conta para aproveitar todos os recursos! :)</p>
    <a href="login.html" id="btnAuthTopo"><button class="btn-login" onclick="realizarLogin()">Fazer login</button></a>
    <p class="criar">Não tem uma conta? <a href="cadastro.html">Criar conta</a></p>

</div>

<div id="overlay-menu" onclick="fecharMenuMobile()"></div>

<main class="comunidade-page">
  <section class="comm-hero-container" aria-labelledby="comunidades-title">
    <div class="comm-header">
      <div class="comm-title">
        <h1 id="comunidades-title">Comunidades</h1>
        <p>Explore grupos locais, profissionais e interesses próximos com uma navegação mais rápida e um visual mais limpo.</p>
      </div>
      <div class="header-actions">
        <label class="search-bar-comm" aria-label="Buscar comunidades">
          <i class="bx bx-search"></i>
          <input id="inputBuscaComm" type="text" placeholder="Buscar comunidades ou assuntos..." onkeyup="filtrarComunidadesTela(this.value)"/>
        </label>
        <button class="btn-create-comm" type="button" onclick="abrirModalCriarComm()">
          <i class="bx bx-plus-circle"></i>
          <span>Criar Grupo</span>
        </button>
      </div>
    </div>

    <section class="my-groups-section" aria-labelledby="meus-grupos-title">
      <div class="section-label" id="meus-grupos-title">Meus grupos</div>
      <div class="groups-scroll" id="listaMeusGrupos">
        <div class="my-group-skeleton" aria-hidden="true"><div class="my-group-skeleton__thumb"></div><div class="my-group-skeleton__line"></div></div>
        <div class="my-group-skeleton" aria-hidden="true"><div class="my-group-skeleton__thumb"></div><div class="my-group-skeleton__line"></div></div>
        <div class="my-group-skeleton" aria-hidden="true"><div class="my-group-skeleton__thumb"></div><div class="my-group-skeleton__line"></div></div>
      </div>
    </section>
  </section>

  <div class="comm-layout">
    <div class="main-feed-comm">
      <div class="comm-filter-nav">
        <button class="chips-arrow comm-filter-arrow left" type="button" aria-label="Categorias anteriores" onclick="scrollCommFiltros(-1)">
          <i class="bx bx-chevron-left"></i>
        </button>
        <div class="filter-tabs" id="commFilterTabs">
          <button class="tab-btn active" data-view="all" onclick="filtrarComunidadesTipo('todos', this)">Todos</button>
          <button class="tab-btn" data-view="high" onclick="filtrarComunidadesTipo('em-alta', this)">Em alta</button>
          <button class="tab-btn" data-view="near" onclick="filtrarComunidadesTipo('perto', this)">Perto de você</button>
          <button class="tab-btn" data-view="new" onclick="filtrarComunidadesTipo('novos', this)">Novos</button>
          <button class="tab-btn" data-view="pro" onclick="filtrarComunidadesTipo('Pro', this)">Profissionais</button>
          <button class="tab-btn" data-view="condo" onclick="filtrarComunidadesTipo('Condomínio', this)">Condomínios</button>
          <button class="tab-btn" data-view="hobby" onclick="filtrarComunidadesTipo('Hobby', this)">Hobbies</button>
        </div>
        <button class="chips-arrow comm-filter-arrow right" type="button" aria-label="Próximas categorias" onclick="scrollCommFiltros(1)">
          <i class="bx bx-chevron-right"></i>
        </button>
      </div>

      <div class="grid-comunidades" id="listaComunidades">
        <div class="comm-skeleton-grid" aria-hidden="true">
          <article class="comm-skeleton-card"><div class="comm-skeleton-card__cover"></div><div class="comm-skeleton-card__body"><div class="comm-skeleton-card__avatar"></div><div class="comm-skeleton-card__content"><div class="comm-skeleton-card__line is-title"></div><div class="comm-skeleton-card__line"></div><div class="comm-skeleton-card__line is-short"></div><div class="comm-skeleton-card__chips"><span></span><span></span><span></span></div></div><div class="comm-skeleton-card__button"></div></div></article>
          <article class="comm-skeleton-card"><div class="comm-skeleton-card__cover"></div><div class="comm-skeleton-card__body"><div class="comm-skeleton-card__avatar"></div><div class="comm-skeleton-card__content"><div class="comm-skeleton-card__line is-title"></div><div class="comm-skeleton-card__line"></div><div class="comm-skeleton-card__line is-short"></div><div class="comm-skeleton-card__chips"><span></span><span></span><span></span></div></div><div class="comm-skeleton-card__button"></div></div></article>
          <article class="comm-skeleton-card"><div class="comm-skeleton-card__cover"></div><div class="comm-skeleton-card__body"><div class="comm-skeleton-card__avatar"></div><div class="comm-skeleton-card__content"><div class="comm-skeleton-card__line is-title"></div><div class="comm-skeleton-card__line"></div><div class="comm-skeleton-card__line is-short"></div><div class="comm-skeleton-card__chips"><span></span><span></span><span></span></div></div><div class="comm-skeleton-card__button"></div></div></article>
          <article class="comm-skeleton-card"><div class="comm-skeleton-card__cover"></div><div class="comm-skeleton-card__body"><div class="comm-skeleton-card__avatar"></div><div class="comm-skeleton-card__content"><div class="comm-skeleton-card__line is-title"></div><div class="comm-skeleton-card__line"></div><div class="comm-skeleton-card__line is-short"></div><div class="comm-skeleton-card__chips"><span></span><span></span><span></span></div></div><div class="comm-skeleton-card__button"></div></div></article>
        </div>
      </div>
    </div>
  </div>
</main>

<button class="comm-floating-create" type="button" aria-label="Criar grupo" onclick="abrirModalCriarComm()"><i class="bx bx-plus"></i></button>

<nav class="bottom-nav">
  <a class="item" href="index.html"><img class="icon azul" loading="lazy" decoding="async" src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png"/><span>Início</span></a>
  <a class="item active" href="comunidade.html"><img class="icon verde" loading="lazy" decoding="async" src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png"/><span>Grupos</span></a>
  <a class="item" href="meuperfil.html"><img class="icon verde" loading="lazy" decoding="async" src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png"/><span>Perfil</span></a>
</nav>

<div class="modal-overlay" id="modalCriarComm">
  <div class="modal-card">
    <button type="button" aria-label="Fechar" onclick="fecharModalCriarComm()" style="position:absolute;top:15px;right:15px;border:none;background:none;font-size:1.5rem;cursor:pointer;line-height:1;">×</button>
    <h2 style="margin-bottom:20px;color:var(--cor2);">Novo Grupo</h2>
    <form onsubmit="criarNovaComunidade(event)">
      <label class="form-label">Nome do grupo</label>
      <input class="form-input" id="commNome" type="text" placeholder="Ex: Eletricistas Unidos" required/>
      <label class="form-label">Descrição</label>
      <textarea class="form-textarea" id="commDesc" placeholder="Sobre o que é este grupo?" required></textarea>
      <label class="form-label">Tipo de comunidade</label>
      <select class="form-select" id="commTipo">
        <option value="Pro">Profissional (networking)</option>
        <option value="Condomínio">Condomínio / vizinhos</option>
        <option value="Hobby">Hobby / interesse</option>
      </select>
      <label class="form-label">Privacidade</label>
      <select class="form-select" id="commPrivacidade">
        <option value="publico">Público</option>
        <option value="privado">Privado</option>
      </select>
      <label class="form-label">Imagem do grupo (opcional)</label>
      <input class="form-input" id="commFoto" type="file" accept="image/*"/>
      <label class="form-label">Capa do grupo (opcional)</label>
      <input class="form-input" id="commCapa" type="file" accept="image/*"/>
      <button class="btn-submit-modal" type="submit">Criar comunidade</button>
    </form>
  </div>
</div>

<script>
window.abrirModalCriarComm = function(){
  const modal = document.getElementById('modalCriarComm');
  if (modal) modal.style.display = 'flex';
};
window.fecharModalCriarComm = function(){
  const modal = document.getElementById('modalCriarComm');
  if (modal) modal.style.display = 'none';
};

function _getCardTitle(card){
  const title = card.querySelector('.com-title') || card.querySelector('.card-title') || card.querySelector('[data-title]');
  return (title ? title.textContent : '').trim();
}
function _getCardTipo(card){
  const attr = (card.getAttribute('data-tipo') || '').trim();
  if (attr) return attr;
  const pill = card.querySelector('.pill');
  return (pill ? pill.textContent : '').trim();
}
window.atualizarHeroStats = function(){};
window.filtrarComunidadesTela = function(termo){
  const q = String(termo || '').toLowerCase().trim();
  document.querySelectorAll('#listaComunidades .com-card, #listaComunidades .card-comm').forEach((card)=>{
    const text = `${_getCardTitle(card)} ${(card.querySelector('.com-desc')?.textContent || '')} ${_getCardTipo(card)}`.toLowerCase();
    card.style.display = !q || text.includes(q) ? '' : 'none';
  });
};
window.filtrarComunidadesTipo = function(tipo, btn){
  document.querySelectorAll('.tab-btn').forEach((b)=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const target = String(tipo || 'todos').toLowerCase();
  const cards = Array.from(document.querySelectorAll('#listaComunidades .com-card, #listaComunidades .card-comm'));
  const newCutoff = Math.max(0, Math.ceil(cards.length * 0.35));
  cards.forEach((card, index)=>{
    const text = String(card.textContent || '').toLowerCase();
    const tipoCard = _getCardTipo(card).toLowerCase();
    const members = Number((text.match(/(\d+)\s*membros?/i) || [0, 0])[1] || 0);
    let ok = false;
    if (target === 'todos') ok = true;
    else if (target === 'em-alta') ok = members >= 50 || tipoCard.includes('pro');
    else if (target === 'novos') ok = index < newCutoff;
    else if (target === 'perto') ok = /bairro|cidade|regiao|região|local|vizinh/.test(text) || tipoCard.includes('condom');
    else ok = tipoCard === target || tipoCard.includes(target);
    card.style.display = ok ? '' : 'none';
  });
};
function atualizarSetasFiltrosComm(){
  const tabs = document.getElementById('commFilterTabs');
  if (!tabs) return;
  const prev = document.querySelector('.comm-filter-arrow.left');
  const next = document.querySelector('.comm-filter-arrow.right');
  const maxLeft = Math.max(0, tabs.scrollWidth - tabs.clientWidth);
  if (prev) prev.disabled = tabs.scrollLeft <= 2;
  if (next) next.disabled = tabs.scrollLeft >= maxLeft - 2;
}
window.scrollCommFiltros = function(dir){
  const tabs = document.getElementById('commFilterTabs');
  if (!tabs) return;
  const amount = Math.max(150, Math.floor(tabs.clientWidth * 0.75));
  tabs.scrollBy({ left: dir < 0 ? -amount : amount, behavior: 'smooth' });
};
(function(){
  const runtime = window.dokePageRuntime || null;
  const on = (target, type, handler, options) => {
    if (!target || typeof target.addEventListener !== 'function') return;
    if (runtime && typeof runtime.on === 'function') return runtime.on(target, type, handler, options);
    target.addEventListener(type, handler, options);
  };
  const later = (handler, ms) => {
    if (runtime && typeof runtime.timeout === 'function') return runtime.timeout(handler, ms);
    return setTimeout(handler, ms);
  };
  function setup(){
    const tabs = document.getElementById('commFilterTabs');
    if (tabs){
      on(tabs, 'scroll', atualizarSetasFiltrosComm, { passive:true });
      on(window, 'resize', atualizarSetasFiltrosComm);
      later(atualizarSetasFiltrosComm, 40);
    }
    const runLoaders = async () => {
      const attempts = [0, 220, 650, 1500];
      for (const delay of attempts){
        if (delay) await new Promise((resolve)=>later(resolve, delay));
        const list = document.getElementById('listaComunidades');
        const mine = document.getElementById('listaMeusGrupos');
        const hasGeneralCards = !!list && !!list.querySelector('.com-card, .card-comm');
        const hasGeneralState = !!list && !!list.querySelector('.comm-state[data-kind="empty"], .comm-state[data-kind="error"]');
        const hasMineCards = !!mine && !!mine.querySelector('.my-group-item');
        const hasMineState = !!mine && !!mine.querySelector('.comm-state[data-kind="empty"], .comm-state[data-kind="error"]');

        if (!hasGeneralCards && !hasGeneralState){
          try { if (typeof window.carregarComunidadesGerais === 'function') await window.carregarComunidadesGerais({ forceFresh: delay > 0, preserveVisible: true }); } catch(e) { console.warn(e); }
        }
        if (!hasMineCards && !hasMineState){
          try { if (typeof window.carregarMeusGrupos === 'function') await window.carregarMeusGrupos({ forceFresh: delay > 0, preserveVisible: true }); } catch(e) { console.warn(e); }
        }

        const readyGeneral = !!list && !!list.querySelector('.com-card, .card-comm, .comm-state[data-kind="empty"], .comm-state[data-kind="error"]');
        const readyMine = !!mine && !!mine.querySelector('.my-group-item, .comm-state[data-kind="empty"], .comm-state[data-kind="error"]');
        if (readyGeneral && readyMine) break;
      }
    };
    runLoaders().catch((e)=>console.warn(e));
  }
  if (document.readyState === 'loading') on(document, 'DOMContentLoaded', setup);
  else setup();
})();
</script>
