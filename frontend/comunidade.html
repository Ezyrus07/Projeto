<meta content="Participe de comunidades, publique conteúdos e interaja com grupos locais." name="description"/>

<body data-page="comunidade">


<main><div class="comm-shell">
<div class="comm-hero-container">
<div class="comm-header">
<div class="comm-title">
<h1>Comunidades</h1>
<p>Explore grupos locais, profissionais e interesses próximos em uma página previsível, com busca rápida e cards mais limpos.</p>
</div>
<div class="comm-actions">
<div class="search-bar-comm"><i class="bx bx-search"></i><input id="inputBuscaComm" placeholder="Buscar comunidades ou assuntos..." type="text"/></div>
<button class="btn-create-comm" onclick="abrirModalCriarComm()" type="button"><i class="bx bx-plus-circle"></i> Criar grupo</button>
</div>
</div>
<section class="my-groups-section">
<div class="my-groups-head"><div class="section-label">Meus grupos</div><button class="btn-refresh-comm" onclick="location.reload()" type="button">Atualizar</button></div>
<div class="groups-scroll" id="listaMeusGrupos"></div>
</section>
</div>
<div class="comm-filter-nav">
<button class="chips-arrow comm-filter-arrow left" type="button"><i class="bx bx-chevron-left"></i></button>
<div class="filter-tabs" id="commFilterTabs">
<button class="tab-btn active" type="button">Todos</button>
<button class="tab-btn" type="button">Em alta</button>
<button class="tab-btn" type="button">Perto de você</button>
<button class="tab-btn" type="button">Novos</button>
<button class="tab-btn" type="button">Profissionais</button>
<button class="tab-btn" type="button">Condomínios</button>
<button class="tab-btn" type="button">Hobbies</button>
</div>
<button class="chips-arrow comm-filter-arrow right" type="button"><i class="bx bx-chevron-right"></i></button>
</div>
<div id="listaComunidades"></div>
</div></main>









<div class="modal-overlay" id="modalCriarComm" style="display:none"><div class="modal-card"><button onclick="fecharModalCriarComm()" style="position:absolute;top:15px;right:15px;border:none;background:none;font-size:1.5rem;cursor:pointer" type="button">×</button><h2 style="margin-bottom:20px;color:#193252">Novo Grupo</h2><form><label class="form-label">Nome do Grupo</label><input class="form-input" id="commNome" placeholder="Ex: Eletricistas Unidos" type="text"/><label class="form-label">Descrição</label><textarea class="form-textarea" id="commDesc" placeholder="Sobre o que é este grupo?"></textarea><label class="form-label">Tipo de Comunidade</label><select class="form-select" id="commTipo"><option value="Pro">Profissional</option><option value="Condomínio">Condomínio</option><option value="Hobby">Hobby</option></select><button class="btn-submit-modal" onclick="fecharModalCriarComm()" type="button">Salvar</button></form></div></div><script defer="" src="doke-shell.js?v=20260313v106"></script></body>
