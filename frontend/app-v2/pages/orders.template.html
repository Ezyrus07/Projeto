<section class="doke-v2-page doke-v2-page-orders" data-orders-page>
  <div class="v2-orders-shell">
    <header class="v2-orders-hero">
      <div class="v2-orders-hero-copy">
        <h1>Gerencie seus pedidos</h1>
        <p>Acompanhe solicitações, andamento e atualizações em um fluxo mais organizado.</p>
      </div>
    </header>

    <section class="v2-orders-toolbar" aria-label="Ferramentas de pedidos">
      <label class="v2-orders-search">
        <i class='bx bx-search'></i>
        <input type="search" placeholder="Buscar por cliente, serviço, prazo ou código" data-orders-search />
      </label>
      <div class="v2-orders-toolbar-actions">
        <button type="button" class="v2-orders-btn" data-orders-sort>
          <i class='bx bx-sort-alt-2'></i>
          <span data-orders-sort-label>Mais recentes</span>
        </button>
        <button type="button" class="v2-orders-btn" data-orders-refresh>
          <i class='bx bx-refresh'></i>
          <span>Atualizar</span>
        </button>
      </div>
    </section>

    <nav class="v2-orders-filters" aria-label="Filtros de status">
      <button type="button" class="v2-orders-chip is-active" data-filter="all">Todos</button>
      <button type="button" class="v2-orders-chip" data-filter="pending">Pendentes</button>
      <button type="button" class="v2-orders-chip" data-filter="progress">Em andamento</button>
      <button type="button" class="v2-orders-chip" data-filter="urgent">Urgentes</button>
      <button type="button" class="v2-orders-chip" data-filter="done">Finalizados</button>
    </nav>

    <section class="v2-orders-panel">
      <div class="v2-orders-panel-head">
        <div>
          <h2>Lista de pedidos</h2>
          <p data-orders-subtitle>Carregando pedidos…</p>
        </div>
      </div>

      <div class="v2-orders-list" data-orders-list></div>

      <div class="v2-orders-empty" data-orders-empty hidden>
        <div class="v2-orders-empty-icon"><i class='bx bx-package'></i></div>
        <h3>Nenhum pedido encontrado</h3>
        <p>Refine a busca ou aguarde novas solicitações aparecerem aqui.</p>
      </div>
    </section>
  </div>
</section>
